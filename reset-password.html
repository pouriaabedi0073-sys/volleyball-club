<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>بازیابی رمز عبور</title>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; padding:24px; background:#f7f7f9; color:#111 }
    .card { max-width:420px; margin:40px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.06) }
    h1 { font-size:18px; margin:0 0 12px }
    input[type=password], input[type=text] { width:100%; padding:10px; margin:8px 0 12px; box-sizing:border-box; border:1px solid #ddd; border-radius:6px }
    button { background:#136a61; color:#fff; border:none; padding:10px 14px; border-radius:6px; cursor:pointer }
    .muted{ color:#666; font-size:13px }
    .hidden{ display:none }
    .ok{ color:green }
    .err{ color:#b91c1c }
  </style>
</head>
<body>
  <div class="card">
    <h1>بازیابی رمز عبور</h1>
    <div id="status" class="muted">درحال بررسی لینک بازیابی...</div>

    <form id="resetForm" class="hidden">
      <label for="newPassword">رمز جدید</label>
      <input id="newPassword" type="password" placeholder="رمز جدید (حداقل 6 حرف)" minlength="6" />
      <button id="doReset">تغییر رمز</button>
    </form>

    <div id="tokenFallback" class="hidden">
      <p class="muted">اگر لینک ایمیل کار نکرد می‌توانید دستی توکن‌ها را قرار دهید:</p>
      <label for="accessToken">access_token</label>
      <input id="accessToken" type="text" placeholder="access_token (از لینک ایمیل)" />
      <label for="refreshToken">refresh_token (اختیاری)</label>
      <input id="refreshToken" type="text" placeholder="refresh_token (اگر در لینک هست)" />
      <button id="useToken">استفاده از توکن</button>
    </div>

    <div id="done" class="hidden">
      <p id="doneMsg" class="ok">رمز با موفقیت تغییر داده شد.</p>
      <p class="muted">حالا می‌توانید وارد سایت شوید.</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // TODO: مقدارهای زیر را با آدرس پروژه و ANON KEY خود جایگزین کن
    const SUPABASE_URL = 'https://your-project-ref.supabase.co'
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const statusEl = document.getElementById('status')
    const resetForm = document.getElementById('resetForm')
    const tokenFallback = document.getElementById('tokenFallback')
    const doneEl = document.getElementById('done')
    const newPwInput = document.getElementById('newPassword')

    function parseAllParams(){
      const out = new URLSearchParams(window.location.search)
      // also merge hash (some supabase links put tokens in the fragment)
      if (window.location.hash && window.location.hash.includes('=')){
        const hash = window.location.hash.replace('#','?')
        const h = new URLSearchParams(hash)
        for (const [k,v] of h) out.set(k,v)
      }
      return out
    }

    async function trySetSessionFromUrl(){
      const params = parseAllParams()
      const type = params.get('type')
      const access_token = params.get('access_token')
      const refresh_token = params.get('refresh_token')

      if (type === 'recovery' && access_token){
        statusEl.textContent = 'در حال تنظیم نشست از لینک...'
        try{
          // اگر refresh token موجود باشد بهتر است ارسال کنیم
          const { data, error } = await supabase.auth.setSession({ access_token, refresh_token })
          if (error) throw error
          statusEl.textContent = 'توکن پذیرفته شد، فرم تغییر رمز آماده است'
          showResetForm()
          return true
        }catch(err){
          console.error('setSession failed', err)
          statusEl.innerHTML = '<span class="err">خطا در خواندن لینک: '+ (err.message || err) +'</span>'
          showFallback()
          return false
        }
      }
      // ممکن است SDK بتواند session را خودش از URL بگیرد (getSessionFromUrl) - ولی ما این fallback را نیز میسازیم
      statusEl.textContent = 'لینک بازیابی حاوی توکن نیست یا پارامترها پیدا نشدند'
      showFallback()
      return false
    }

    function showResetForm(){ tokenFallback.classList.add('hidden'); resetForm.classList.remove('hidden'); doneEl.classList.add('hidden') }
    function showFallback(){ tokenFallback.classList.remove('hidden'); resetForm.classList.add('hidden'); doneEl.classList.add('hidden') }
    function showDone(msg){ resetForm.classList.add('hidden'); tokenFallback.classList.add('hidden'); doneEl.classList.remove('hidden'); if (msg) document.getElementById('doneMsg').textContent = msg }

    document.getElementById('useToken').addEventListener('click', async (e)=>{
      e.preventDefault()
      const access_token = document.getElementById('accessToken').value.trim()
      const refresh_token = document.getElementById('refreshToken').value.trim()
      if (!access_token) { alert('access_token را وارد کن'); return }
      statusEl.textContent = 'در حال تنظیم نشست از توکن وارد شده...'
      try{
        const { data, error } = await supabase.auth.setSession({ access_token, refresh_token })
        if (error) throw error
        statusEl.textContent = 'نشست تنظیم شد'
        showResetForm()
      }catch(err){
        console.error('setSession failed', err)
        statusEl.innerHTML = '<span class="err">خطا: '+ (err.message || err) +'</span>'
      }
    })

    resetForm.addEventListener('submit', async (e)=>{
      e.preventDefault()
      const pw = newPwInput.value.trim()
      if (!pw || pw.length < 6) { alert('یک رمز حداقل 6 کاراکتر وارد کنید'); return }
      statusEl.textContent = 'در حال تغییر رمز...'
      try{
        const { data, error } = await supabase.auth.updateUser({ password: pw })
        if (error) throw error
        showDone('رمز با موفقیت تغییر یافت.')
        // بعد از موفقیت می‌توانیم کاربر را به صفحه ورود هدایت کنیم
        setTimeout(()=>{
          window.location.href = '/' // یا صفحه ورود شما
        }, 1800)
      }catch(err){
        console.error('updateUser failed', err)
        statusEl.innerHTML = '<span class="err">خطا در تغییر رمز: '+ (err.message || err) +'</span>'
      }
    })

    // اجرا در بارگذاری صفحه
    trySetSessionFromUrl()
  </script>
</body>
</html>
